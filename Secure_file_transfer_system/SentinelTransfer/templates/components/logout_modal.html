<!-- templates/components/logout_modal.html -->
<!-- Logout Confirmation Modal - SentinelTransfer Enterprise -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content logout-modal-content">
            <!-- Modal Header with Danger Icon -->
            <div class="modal-header border-0 pb-0">
                <div class="logout-icon-wrapper">
                    <i class="bi bi-box-arrow-right"></i>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <!-- Modal Body -->
            <div class="modal-body text-center pt-0">
                <h4 class="logout-title">Ready to Leave?</h4>
                <p class="logout-message">
                    Are you sure you want to logout of SentinelTransfer?
                </p>
                <div class="logout-warning">
                    <i class="bi bi-shield-exclamation"></i>
                    <span>Your active session will be terminated</span>
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary logout-cancel-btn" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i> Cancel
                </button>
                <button type="button" class="btn btn-danger logout-confirm-btn" id="confirmLogoutBtn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Logout Modal Custom Styles */
    .logout-modal-content {
        background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-tertiary) 100%);
        border: 1px solid rgba(220, 53, 69, 0.3);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(220, 53, 69, 0.1);
        position: relative;
        overflow: hidden;
    }
    
    /* Animated background effect */
    .logout-modal-content::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(220, 53, 69, 0.05) 0%, transparent 70%);
        animation: pulse-glow 3s ease-in-out infinite;
        pointer-events: none;
    }
    
    @keyframes pulse-glow {
        0%, 100% {
            opacity: 0.3;
            transform: scale(1);
        }
        50% {
            opacity: 0.6;
            transform: scale(1.05);
        }
    }
    
    /* Logout Icon Wrapper */
    .logout-icon-wrapper {
        width: 70px;
        height: 70px;
        margin: 0 auto;
        background: linear-gradient(135deg, rgba(220, 53, 69, 0.15), rgba(220, 53, 69, 0.05));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(220, 53, 69, 0.3);
        animation: icon-pulse 2s ease-in-out infinite;
    }
    
    @keyframes icon-pulse {
        0%, 100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4);
        }
        50% {
            transform: scale(1.05);
            box-shadow: 0 0 0 10px rgba(220, 53, 69, 0);
        }
    }
    
    .logout-icon-wrapper i {
        font-size: 2.5rem;
        color: #dc3545;
        filter: drop-shadow(0 0 8px rgba(220, 53, 69, 0.5));
    }
    
    /* Modal Typography */
    .logout-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
        background: linear-gradient(135deg, #fff, #dc3545);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    
    .logout-message {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 1rem;
        line-height: 1.5;
    }
    
    /* Warning Badge */
    .logout-warning {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        background: rgba(220, 53, 69, 0.1);
        border-radius: 30px;
        font-size: 0.75rem;
        color: #ea868f;
        border: 1px solid rgba(220, 53, 69, 0.2);
        margin-top: 0.5rem;
    }
    
    .logout-warning i {
        font-size: 0.9rem;
    }
    
    /* Button Styles */
    .logout-cancel-btn {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-light);
        color: var(--text-secondary);
        padding: 0.5rem 1.25rem;
        border-radius: 10px;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    
    .logout-cancel-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent-blue);
        color: var(--accent-blue);
        transform: translateY(-1px);
    }
    
    .logout-confirm-btn {
        background: linear-gradient(135deg, #dc3545, #c82333);
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
    }
    
    .logout-confirm-btn:hover {
        background: linear-gradient(135deg, #c82333, #bd2130);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(220, 53, 69, 0.4);
    }
    
    .logout-confirm-btn:active {
        transform: translateY(0);
    }
    
    /* Modal Animation */
    .modal.fade .modal-dialog {
        transform: scale(0.95) translateY(-20px);
        transition: transform 0.2s ease-out;
    }
    
    .modal.show .modal-dialog {
        transform: scale(1) translateY(0);
    }
    
    /* Close button styling */
    .btn-close-white {
        filter: invert(1) grayscale(100%) brightness(200%);
        opacity: 0.6;
        transition: opacity 0.2s;
    }
    
    .btn-close-white:hover {
        opacity: 1;
    }
    
    /* Responsive adjustments */
    @media (max-width: 576px) {
        .logout-icon-wrapper {
            width: 60px;
            height: 60px;
        }
        
        .logout-icon-wrapper i {
            font-size: 2rem;
        }
        
        .logout-title {
            font-size: 1.25rem;
        }
        
        .logout-message {
            font-size: 0.85rem;
        }
        
        .logout-cancel-btn,
        .logout-confirm-btn {
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }
    }
    
    /* Additional glow effect on focus */
    .logout-confirm-btn:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.5);
    }
    
    .logout-cancel-btn:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.3);
    }
</style>

<script>
    // Initialize logout modal functionality
    document.addEventListener('DOMContentLoaded', function() {
        // Get the logout button from the sidebar
        const logoutSidebarItem = document.querySelector('.nav-item.logout-item');
        const logoutModal = document.getElementById('logoutModal');
        
        if (logoutSidebarItem && logoutModal) {
            // Remove any existing click handlers
            const newLogoutItem = logoutSidebarItem.cloneNode(true);
            logoutSidebarItem.parentNode.replaceChild(newLogoutItem, logoutSidebarItem);
            
            // Add click handler to show modal
            newLogoutItem.addEventListener('click', function(e) {
                e.preventDefault();
                const modal = new bootstrap.Modal(logoutModal);
                modal.show();
            });
        }
        
        // Handle confirm logout
        const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
        if (confirmLogoutBtn) {
            confirmLogoutBtn.addEventListener('click', function() {
                // Show loading state on button
                const originalText = this.innerHTML;
                this.innerHTML = '<i class="bi bi-hourglass-split"></i> Logging out...';
                this.disabled = true;
                
                // Simulate logout process (replace with actual logout logic)
                setTimeout(() => {
                    // Clear any session/local storage if needed
                    // localStorage.removeItem('sentinelSession');
                    // sessionStorage.clear();
                    
                    // Show toast notification before redirect
                    if (window.showToast) {
                        window.showToast('Logging out of SentinelTransfer...', 'info');
                    }
                    
                    // Redirect to login page (update with your actual login route)
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 500);
                }, 800);
            });
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && logoutModal && logoutModal.classList.contains('show')) {
                const modal = bootstrap.Modal.getInstance(logoutModal);
                if (modal) modal.hide();
            }
        });
    });
</script>
